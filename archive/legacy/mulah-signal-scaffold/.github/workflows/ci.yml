name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  repo-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Print structure
        run: |
          echo "Repo initialized"
          ls -la
